<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeremiah Kilonzi | AI Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --card: rgba(255,255,255,0.05);
    --text: #e2e8f0;
    --accent: #6366f1;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    color: var(--text);
    overflow-x: hidden;
}

/* GLOW BACKGROUND */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #6366f1, transparent);
    filter: blur(120px);
    top: -100px;
    left: -100px;
    animation: float 10s infinite alternate;
}

@keyframes float {
    to { transform: translate(200px,200px); }
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    z-index: 1000;
}

nav a {
    color: var(--text);
    text-decoration: none;
    margin: 0 15px;
}

/* HERO */
header {
    text-align: center;
    padding: 150px 20px 80px;
}

header h1 {
    font-size: 3.5rem;
    background: linear-gradient(to right, #6366f1, #22d3ee);
    -webkit-background-clip: text;
    color: transparent;
}

.typing {
    color: #94a3b8;
    height: 30px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 14px 32px;
    background: linear-gradient(45deg, #6366f1, #22d3ee);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
}

/* CARD */
.card {
    background: var(--card);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-5px);
}

/* DEMO */
#live-demo {
    padding: 80px 20px;
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px;
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* LOADER */
#loader {
    margin: 20px auto;
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,255,255,0.1);
    border-top: 5px solid #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* TERMINAL OUTPUT */
#result {
    margin-top: 15px;
    background: black;
    color: #00ff88;
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
}

/* PROJECTS */
.projects {
    display: grid;
    gap: 25px;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    padding: 40px;
}

.project {
    padding: 20px;
}

/* SCROLL ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
    <div><strong>JK</strong></div>
    <div>
        <a href="#demo">Demo</a>
        <a href="#projects">Projects</a>
    </div>
</nav>

<header>
    <h1>Jeremiah Kilonzi</h1>
    <div class="typing" id="typing"></div>
    <a href="#demo" class="btn">Launch Demo</a>
</header>

<section id="demo" class="fade">
    <h2 style="text-align:center;">🚀 Live Backend Engine</h2>

    <div class="card" style="max-width:500px;margin:auto;">
        <input id="taskType" placeholder="Task type">
        <textarea id="payload" placeholder='{"user":"demo"}'></textarea>

        <button id="runBtn" onclick="runTask()">Execute</button>

        <div id="loader"></div>
        <pre id="result"></pre>
    </div>
</section>

<section id="projects" class="fade">
    <h2 style="text-align:center;">Projects</h2>

    <div class="projects">
        <div class="card project">
            <h3>HEART-LAYER</h3>
            <p>Async distributed execution system</p>
        </div>

        <div class="card project">
            <h3>Fraud Detection</h3>
            <p>ML system for financial anomaly detection</p>
        </div>
    </div>
</section>

<script>
// Typing effect
const texts = ["AI Engineer", "Building Intelligent Systems", "Backend Architect"];
let i=0,j=0,del=false;

function type(){
    let t=texts[i];
    document.getElementById("typing").innerHTML=t.substring(0,j);

    if(!del && j<t.length){j++; setTimeout(type,80);}
    else if(del && j>0){j--; setTimeout(type,40);}
    else{
        del=!del;
        if(!del) i=(i+1)%texts.length;
        setTimeout(type,1000);
    }
}
type();

// Scroll animation
const fades=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
    fades.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight-100){
            el.classList.add("show");
        }
    });
});

// RUN TASK
async function runTask() {
    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("result");
    const btn = document.getElementById("runBtn");

    loader.style.display = "block";
    btn.disabled = true;
    btn.innerText = "Running...";

    const projectId = "live-" + Date.now();

    await fetch("https://your-app.up.railway.app/internal/execute", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            project_id: projectId,
            task_type: document.getElementById("taskType").value || "demo",
            payload: JSON.parse(document.getElementById("payload").value || "{}")
        })
    });

    let status="running";

    while(status==="running"){
        await new Promise(r=>setTimeout(r,1500));
        const res=await fetch(`https://your-app.up.railway.app/runtime/${projectId}`);
        const data=await res.json();
        status=data.status;

        resultBox.textContent = JSON.stringify(data,null,2);
    }

    loader.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Execute";
}
</script>

</body>
</html>
