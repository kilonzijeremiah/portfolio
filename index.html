<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeremiah Kilonzi | AI Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --bg2: #0f172a;
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);

    --text: #e2e8f0;
    --muted: #94a3b8;

    --primary: #6366f1;
    --secondary: #22d3ee;
    --accent: #a78bfa;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    color: var(--text);
}

/* MULTI GLOW (MORE DYNAMIC) */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--primary), transparent);
    filter: blur(140px);
    top: -100px;
    left: -100px;
    animation: float 12s infinite alternate;
}

.bg-glow::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--secondary), transparent);
    top: 200px;
    left: 200px;
    filter: blur(140px);
}

@keyframes float {
    to { transform: translate(250px,200px); }
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(16px);
    background: rgba(2,6,23,0.6);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    z-index: 1000;
}

nav a {
    color: var(--muted);
    text-decoration: none;
    margin: 0 15px;
    transition: 0.3s;
}

nav a:hover {
    color: white;
}

/* HERO */
header h1 {
    font-size: 3.5rem;
    background: linear-gradient(to right, #6366f1, #22d3ee, #a78bfa);
    -webkit-background-clip: text;
    color: transparent;
}

.typing {
    color: var(--muted);
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 14px 32px;
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    border-radius: 12px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 0 25px rgba(99,102,241,0.4);
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(34,211,238,0.6);
}

/* CARD (GLASS EFFECT) */
.card {
    background: var(--card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: white;
}

input:focus, textarea:focus {
    outline: none;
    border: 1px solid var(--primary);
    box-shadow: 0 0 10px rgba(99,102,241,0.5);
}

/* BUTTON */
button {
    padding: 12px;
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 20px rgba(34,211,238,0.5);
}

/* TERMINAL */
#result {
    margin-top: 15px;
    background: #020617;
    color: #22c55e;
    padding: 15px;
    border-radius: 12px;
    font-family: monospace;
    border: 1px solid var(--border);
}

/* PROJECTS */
.project h3 {
    background: linear-gradient(to right, #22d3ee, #a78bfa);
    -webkit-background-clip: text;
    color: transparent;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
    <div><strong>JK</strong></div>
    <div>
        <a href="#demo">Demo</a>
        <a href="#projects">Projects</a>
    </div>
</nav>

<header>
    <h1>Jeremiah Kilonzi</h1>
    <div class="typing" id="typing"></div>
    <a href="#demo" class="btn">Launch Demo</a>
</header>

<section id="demo" class="fade">
    <h2 style="text-align:center;">Live Backend Engine</h2>

    <div class="card" style="max-width:500px;margin:auto;">
        <input id="taskType" placeholder="Task type">
        <textarea id="payload" placeholder='{"user":"demo"}'></textarea>

        <button id="runBtn" onclick="runTask()">Execute</button>

        <div id="loader"></div>
        <pre id="result"></pre>
    </div>
</section>

<section id="projects" class="fade">
    <h2 style="text-align:center;">Projects</h2>

    <div class="projects">
        <div class="card project">
            <h3>HEART-LAYER</h3>
            <p>Async distributed execution system</p>
        </div>

        <div class="card project">
            <h3>Fraud Detection</h3>
            <p>ML system for financial anomaly detection</p>
        </div>
    </div>
</section>

<script>
// 🔗 CONNECTED BACKEND
const BASE_URL = "https://heart-layer-production.up.railway.app";

// Typing effect
const texts = ["AI Engineer", "Building Intelligent Systems", "Backend Architect"];
let i=0,j=0,del=false;

function type(){
    let t=texts[i];
    document.getElementById("typing").innerHTML=t.substring(0,j);

    if(!del && j<t.length){j++; setTimeout(type,80);}
    else if(del && j>0){j--; setTimeout(type,40);}
    else{
        del=!del;
        if(!del) i=(i+1)%texts.length;
        setTimeout(type,1000);
    }
}
type();

// Scroll animation
const fades=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
    fades.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight-100){
            el.classList.add("show");
        }
    });
});

// 🚀 RUN TASK
async function runTask() {
    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("result");
    const btn = document.getElementById("runBtn");

    loader.style.display = "block";
    btn.disabled = true;
    btn.innerText = "Running...";

    const projectId = "live-" + Date.now();

    let payloadData = {};

    // ✅ Safe JSON parsing
    try {
        payloadData = JSON.parse(document.getElementById("payload").value || "{}");
    } catch (e) {
        resultBox.textContent = "❌ Invalid JSON payload";
        loader.style.display = "none";
        btn.disabled = false;
        btn.innerText = "Execute";
        return;
    }

    try {
        // 🔥 Send task to backend
        await fetch(`${BASE_URL}/internal/execute`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                project_id: projectId,
                task_type: document.getElementById("taskType").value || "predict",
                payload: payloadData
            })
        });

        let status = "running";

        // 🔁 Poll result
        while(status === "running"){
            await new Promise(r => setTimeout(r,1500));

            const res = await fetch(`${BASE_URL}/runtime/${projectId}`);
            const data = await res.json();
            status = data.status;

            resultBox.textContent = JSON.stringify(data, null, 2);
        }

    } catch (err) {
        resultBox.textContent = "❌ Backend error: " + err.message;
    }

    loader.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Execute";
}
</script>

</body>
</html>
